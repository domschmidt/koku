name: ci

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    environment:
      name: SemRel

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=domschmidt_koku -Dsonar.organization=domschmidt

  frontend:
    name: Frontend lint and test and build
    runs-on: ubuntu-latest
    environment:
      name: SemRel

    defaults:
      run:
        working-directory: koku-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Generate backend DTO types
        working-directory: .
        run: mvn -B -T 1C -pl koku-frontend -am install -DskipTests

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: koku-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        with:
          projectBaseDir: koku-frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONTEND }}

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    timeout-minutes: 35
    env:
      CI: "true"
      COMPOSE_PROJECT_NAME: koku-e2e-${{ github.run_id }}-${{ github.run_attempt }}
      KOKU_E2E_BASE_URL: http://127.0.0.1:4200
      KOKU_E2E_HOST: koku.test
      KOKU_E2E_KEYCLOAK_URL: http://koku.test:8081
      KOKU_E2E_PASSWORD: e2e-admin
      KOKU_E2E_SEED: "true"
      KOKU_E2E_USERNAME: e2e-admin

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: koku-frontend/package-lock.json

      - name: Build backend images from this revision
        run: mvn -B install -Dmaven.test.skip=true -Pjib-dockerBuild

      - name: Build frontend image from this revision
        run: docker compose -f compose.e2e.yml build koku-frontend

      - name: Register the E2E hostname
        run: echo "127.0.0.1 koku.test" | sudo tee -a /etc/hosts

      - name: Start the E2E stack
        run: docker compose -f compose.e2e.yml up -d --wait --wait-timeout 240

      - name: Install frontend dependencies
        working-directory: koku-frontend
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Install Playwright Chromium
        working-directory: koku-frontend
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: koku-frontend
        run: npm run e2e:ci

      - name: Capture container logs
        if: always()
        run: docker compose -f compose.e2e.yml logs --no-color > compose-e2e.log

      - name: Upload E2E diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-diagnostics-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 7
          path: |
            compose-e2e.log
            koku-frontend/playwright-report
            koku-frontend/test-results

      - name: Stop the E2E stack
        if: always()
        run: docker compose -f compose.e2e.yml down -v --remove-orphans

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
