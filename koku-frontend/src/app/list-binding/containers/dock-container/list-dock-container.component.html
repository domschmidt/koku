<div class="flex flex-col h-full">
  <koku-dock [content]="dockConfig()" (activationRequested)="onDockContentActivationRequested($event)">
    <div class="flex-1"></div>

    @if (activeContent(); as activeContent) {
      @if (activeContent.content; as activeContentPayload) {
        <div
          list-inline-content
          [content]="activeContentPayload"
          [contentSetup]="contentSetup()"
          [urlSegments]="urlSegments()"
          [buttonDockOutlet]="buttonDockOutlet()"
          [parentRoutePath]="activeContent.parentRoutePath || ''"
          [context]="context()"
          (closeRequested)="closeInlineContent()"
          (openRoutedContentRequested)="openRoutedContent($event)"
          class="flex overflow-auto"
        ></div>
      }
    }
  </koku-dock>
</div>
