<label class="w-full" [attr.for]="id">
  @if (label(); as label) {
    <div class="label">
      <span class="label-text">{{ label }}</span>
    </div>
  }
</label>

<input
  [name]="name()"
  type="month"
  [attr.disabled]="disabled() ? '' : null"
  class="input w-full"
  [attr.required]="required()"
  [value]="value()"
  (input)="typeRaw($event)"
  (blur)="blurredRaw($event)"
  (focus)="focused.emit()"
  [attr.id]="id"
/>
