@if (formularData(); as formularData) {
  <form class="flex flex-col w-full h-full m-auto overflow-auto" (submit)="$event.preventDefault(); submit()">
    @if (formularData.rootId; as rootId) {
      @if (runtime.contentSignal(rootId)(); as contentRoot) {
        <div class="px-4 pt-4 pb-2 w-full h-full overflow-auto">
          <div
            formular-content-renderer
            [content]="$any(contentRoot)"
            [runtime]="runtime"
            [loading]="sourceLoading()"
            [submitting]="submitting()"
            [contentRegistry]="contentRegistry()"
            [context]="context()"
            class="flex flex-col m-auto"
            [style.max-width]="maxWidth()"
            [buttonDockOutlet]="buttonDockOutlet()"
          ></div>
        </div>
      }
    }

    <button type="submit" class="hidden">
      <span>Speichern</span>
    </button>
  </form>
}
